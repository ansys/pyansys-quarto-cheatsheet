title: cheat sheet
version: 0.1.0
contributes:
  formats:
    pdf:
      documentclass: article
      fontsize: 9pt
      classoption: landscape
      authorcols: false
      header-includes: |
          \usepackage[landscape]{geometry}
          \usepackage{color,graphicx}
          \usepackage[bookmarks=false]{hyperref}
          \usepackage{wrapfig}
          \usepackage{eso-pic}
          \usepackage{float}
          \usepackage{tabularx}
          \usepackage{multicol}
          \usepackage{calc}
          \usepackage{ifthen}
          \usepackage{multirow}
          \usepackage{listings}
          \usepackage[x11names]{xcolor}
          \usepackage{fontspec}
          \setmathfont{Latin Modern Math}
          \usepackage{algorithm}
          \usepackage{algpseudocode}
      template-partials: ["partials/before-body.tex", partials/title.tex, partials/after-body.tex]
      format-resources:
        - _static
      # cache: false
      resource-path: ["_static"]
      listings: true
      sansfontoptions: ["sfdefault"]
